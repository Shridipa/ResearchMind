name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend[dev]"
      - name: Run tests
        env:
          OPENROUTER_API_KEY: "mock_key_for_ci_tests"
          AWS_ACCESS_KEY_ID: "mock"
          AWS_SECRET_ACCESS_KEY: "mock"
        run: python -m pytest -q tests backend/tests
      - name: Compile
        run: python -m compileall backend evaluations benchmarks

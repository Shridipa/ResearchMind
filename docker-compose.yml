services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - configs/.env.example
    volumes:
      - ./data:/app/data
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
